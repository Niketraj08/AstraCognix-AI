<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstraCogniX AI SaaS Platform</title>
    <!-- PWA Meta tags and Manifest -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="theme-color" content="#FF6B00" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AstraCogniX" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- PWA Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((reg) => {
              console.log("[PWA] Service Worker registered successfully:", reg.scope);
              
              // Request notification permission if desired
              if ("Notification" in window && Notification.permission === "default") {
                // Request silently or on first interaction
              }
            })
            .catch((err) => {
              console.error("[PWA] Service Worker registration failed:", err);
            });
        });
      }
    </script>
  </body>
</html>
